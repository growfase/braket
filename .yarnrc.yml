# Fallback for the Cloudflare build. The `packageManager` field in package.json
# pins Yarn Classic (1.22.22), which reads the committed v1 yarn.lock natively.
# Yarn Classic ignores this file — it only reads `.yarnrc`. But if the build env
# ever forces Yarn Berry (yarn 4.x) anyway, these settings stop it from failing
# on the v1 -> Berry lockfile migration (YN0028) and keep a classic layout.
enableImmutableInstalls: false
nodeLinker: node-modules
